<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾禾園 - 專業極簡後台 V13.0</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #d93025; --text-main: #3c4043; --text-sub: #70757a; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f1f3f4; color: var(--text-main); padding: 20px; margin: 0; }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 1px 3px rgba(60,64,67,0.3); margin-bottom: 25px; }
        h1 { color: var(--text-main); font-size: 20px; font-weight: 500; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* 🌟 表格風格優化：清爽留白 */
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1100px; }
        th { text-align: left; padding: 12px 15px; border-bottom: 2px solid #eee; color: var(--text-sub); font-weight: 500; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f1f1; vertical-align: middle; }
        tr:hover { background-color: var(--bg-gray); }

        /* 🌟 數字與欄位美化 */
        .main-info { font-size: 16px; font-weight: 600; color: #202124; }
        .sub-info { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
        .amount-tag { font-size: 13px; color: var(--success); font-weight: 500; }
        
        /* 🌟 勞健保/眷屬極簡排版 */
        .ins-box { display: flex; flex-direction: column; gap: 2px; }
        .ins-row { font-size: 15px; font-weight: 600; color: #444; display: flex; align-items: center; gap: 8px; }
        .ins-row span { font-size: 11px; font-weight: 400; color: #9aa0a6; width: 35px; }
        .dependent-tag { font-size: 11px; background: #e8f0fe; color: var(--primary); padding: 1px 6px; border-radius: 4px; font-weight: 500; }

        /* 🌟 特休顯示 */
        .leave-bubble { display: inline-block; text-align: center; }
        .remain-num { font-size: 18px; font-weight: 700; color: #d93025; }
        
        /* 🌟 證明文件按鈕：極簡膠囊 */
        .proof-btn { 
            display: inline-flex; align-items: center; gap: 4px; background: #fff; color: var(--text-sub) !important;
            border: 1px solid #dadce0; padding: 5px 12px; border-radius: 100px; text-decoration: none;
            font-size: 12px; font-weight: 500; transition: all 0.2s;
        }
        .proof-btn:hover { background: var(--bg-gray); border-color: var(--primary); color: var(--primary) !important; }

        /* 按鈕與表單 */
        .form-row { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; background: var(--bg-gray); padding: 20px; border-radius: 12px;}
        .input-group { display: flex; flex-direction: column; flex: 1 1 120px; }
        .input-group label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
        .input-group input, .input-group select { padding: 10px; border: 1px solid #dadce0; border-radius: 8px; font-size: 14px; outline: none; }
        .input-group input:focus { border-color: var(--primary); }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 14px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: #f4b400; color: white; }
        .btn-edit { background: white; color: var(--text-main); border: 1px solid #dadce0; }
        .btn-edit:hover { background: var(--bg-gray); }
        
        .top-nav { background: #202124; color: white; display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; border-radius: 12px; margin-bottom: 20px; }
        
        /* Loading Overlay */
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div><div id="loadingText">請稍候...</div></div>

<div class="container top-nav">
    <div style="font-size:18px; font-weight:500;">禾禾園 · 智慧管理系統</div>
    <div style="display:flex; align-items:center; gap:15px;">
        <select id="adminRole" onchange="authRole()" style="background:#3c4043; color:white; border:none; padding:8px 12px; border-radius:6px; outline:none;">
            <option value="業務部主管">業務部主管</option><option value="生產部主管">生產部主管</option><option value="運輸部主管">運輸部主管</option><option value="倉儲部主管">倉儲部主管</option><option value="會計部">會計部</option><option value="人事部">人事部</option><option value="副總">副總</option>
        </select>
        <button class="btn btn-primary" style="padding:6px 16px; font-size:13px;" onclick="fetchData()">🔄 同步</button>
    </div>
</div>

<div id="hrBox" class="container" style="display:none;">
    <h1>👥 員工名冊管理</h1>
    <div class="form-row" id="employeeForm">
        <div class="input-group"><label>姓名</label><input type="text" id="eName" placeholder="員工姓名"></div>
        <div class="input-group"><label>部門</label><select id="eDept"><option>業務部</option><option>會計部</option><option>生產部</option><option>運輸部</option><option>倉儲部</option><option>人事部</option></select></div>
        <div class="input-group"><label>到職日期</label><input type="date" id="eDate"></div>
        <div class="input-group"><label>月薪底薪</label><input type="number" id="eSal"></div>
        <div class="input-group"><label>變動獎金</label><input type="number" id="eBonus" value="0"></div>
        <div class="input-group"><label>勞保費</label><input type="number" id="eLabor" value="0"></div>
        <div class="input-group"><label>健保費</label><input type="number" id="eHealth" value="0"></div>
        <div class="input-group"><label>健保眷屬</label><input type="number" id="eDependents" value="0"></div>
        <div class="input-group-btn" style="display:flex; align-items:flex-end;">
            <button id="saveBtn" class="btn btn-primary" onclick="saveEmp()">儲存設定</button>
            <button id="cancelEditBtn" class="btn btn-edit" style="display:none; margin-left:8px;" onclick="cancelEdit()">取消</button>
        </div>
    </div>
    <div class="table-responsive">
        <table>
            <thead><tr><th>員工資訊</th><th>特休狀態</th><th>薪資項目</th><th>勞健保費用</th><th>管理</th></tr></thead>
            <tbody id="empBody"></tbody>
        </table>
    </div>
</div>

<div class="container">
    <h1>📝 出勤假單審核</h1>
    <div class="table-responsive">
        <table>
            <thead><tr><th>部門 / 姓名</th><th>請假起訖時間</th><th>假別</th><th>證明</th><th>狀態</th><th>審核</th></tr></thead>
            <tbody id="leaveBody"></tbody>
        </table>
    </div>
</div>

<div id="reportBox" class="container" style="display:none;">
    <h1>📊 結算與報表</h1>
    <div style="display: flex; gap: 15px; align-items: center;">
        <input type="month" id="rMonth" style="padding: 10px; border-radius: 8px; border: 1px solid #dadce0;"> 
        <button class="btn btn-primary" onclick="calcSalary()">🧮 1. 結算薪資</button>
        <button class="btn btn-success" onclick="exportExcel()">📥 2. 匯出 Excel</button>
        <button class="btn btn-warning" onclick="makePDF()">📄 3. 生成 PDF</button>
    </div>
</div>

<script>
    const CONFIG_URL = "https://script.google.com/macros/s/AKfycbx0clQCOIOULOi58C0ffABTWNEwDa3KFVUF0TK9FCcj-O1aFLtxWkIF0IOv7bn_Wml4RA/exec";
    let db = {}; let editingEmpName = null;

    function showLoading(t){ document.getElementById('loadingText').innerText=t; document.getElementById('loadingOverlay').style.display='flex'; }
    function hideLoading(){ document.getElementById('loadingOverlay').style.display='none'; }

    function formatTime(s) {
        if (!s) return ""; const d = new Date(s); if (isNaN(d)) return s;
        const p = (n) => n.toString().padStart(2, '0');
        return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    function authRole() {
        const r = document.getElementById('adminRole').value;
        if((r==='人事部' || r==='會計部') && prompt("管理員驗證")!=="123") document.getElementById('adminRole').value="業務部主管";
        render();
    }

    async function fetchData() { 
        showLoading("同步中...");
        try { const res = await fetch(CONFIG_URL); db = await res.json(); render(); } 
        catch (e) { alert("連線超時"); } finally { hideLoading(); }
    }

    function render() {
        const role = document.getElementById('adminRole').value;
        const isHR = role === '人事部' || role === '副總';
        document.getElementById('hrBox').style.display = isHR ? 'block' : 'none';
        document.getElementById('reportBox').style.display = (isHR || role === '會計部') ? 'block' : 'none';

        if(db.employees && db.leave) {
            document.getElementById('empBody').innerHTML = db.employees.filter(r=>r[0]!=="姓名").map(r => {
                const total = Number(r[5]) || 0;
                const used = db.leave.filter(l => l[2] === r[0] && l[4] === "特休" && l[8] === "已生效").length;
                return `<tr>
                    <td><div class="main-info">${r[0]}</div><div class="sub-info">${r[1]} · 到職 ${formatTime(r[4]).split(' ')[0]}</div></td>
                    <td><div class="leave-bubble"><div class="remain-num">${total-used}</div><div class="sub-info">剩餘 / 總 ${total}</div></div></td>
                    <td><div class="main-info">$${r[3]}</div><div class="amount-tag">+ 獎金 $${r[6]||0}</div></td>
                    <td><div class="ins-box">
                        <div class="ins-row"><span>勞保</span>$${r[7]||0}</div>
                        <div class="ins-row"><span>健保</span>$${r[8]||0} <i class="dependent-tag">${r[9]||0}口</i></div>
                    </div></td>
                    <td><button class="btn btn-edit" onclick="startEdit('${r[0]}','${r[1]}','${r[3]}','${r[4]}','${r[7]}','${r[8]}','${r[9]}','${r[6]}')">修改</button></td>
                </tr>`;
            }).join('');
        }

        if (db.leave) {
            document.getElementById('leaveBody').innerHTML = db.leave.filter(r => r[0] !== "ID" && r[0] !== "單號").reverse().map(r => {
                let next = ''; 
                if(role.includes(r[3]) && r[8]==='待主管審核') next = '待人事審核'; 
                else if(role==='人事部' && r[8]==='待人事審核') next = '待副總審核'; 
                else if(role==='副總' && r[8]==='待副總審核') next = '已生效'; 
                let pf = (r[9] && String(r[9]).includes('http')) ? `<a href="${r[9]}" target="_blank" class="proof-btn">📎 查看</a>` : `<span style="color:#eee">無</span>`;
                return `<tr><td><div class="main-info">${r[2]}</div><div class="sub-info">${r[3]}</div></td><td style="font-size:12px;">${formatTime(r[5])}<br>至 ${formatTime(r[6])}</td><td>${r[4]}</td><td>${pf}</td><td><span style="font-size:12px; color:${r[8]==='已生效'?'var(--success)':'#f4b400'}">${r[8]}</span></td><td>${next?`<button class="btn btn-primary" style="padding:4px 12px; font-size:12px;" onclick="updLv('${r[0]}','${next}')">核准</button>`:'-'}</td></tr>`;
            }).join('');
        }
    }

    async function saveEmp() { 
        showLoading("更新資料中...");
        const d = { action: editingEmpName ? "editEmployee" : "saveEmployee", name: document.getElementById('eName').value, dept: document.getElementById('eDept').value, onboardingDate: document.getElementById('eDate').value, salary: document.getElementById('eSal').value, laborIns: document.getElementById('eLabor').value, healthIns: document.getElementById('eHealth').value, dependents: document.getElementById('eDependents').value, bonus: document.getElementById('eBonus').value };
        await fetch(CONFIG_URL, {method:'POST', body:JSON.stringify(d)}); cancelEdit(); await fetchData();
    }
    
    function startEdit(n, dp, s, dt, l, h, dep, b) {
        editingEmpName = n; document.getElementById('eName').value = n; document.getElementById('eName').disabled = true;
        document.getElementById('eDept').value = dp; document.getElementById('eSal').value = s;
        if(dt) document.getElementById('eDate').value = new Date(dt).toISOString().split('T')[0];
        document.getElementById('eLabor').value = l; document.getElementById('eHealth').value = h;
        document.getElementById('eDependents').value = dep; document.getElementById('eBonus').value = b;
        document.getElementById('saveBtn').innerText = "確認修改"; document.getElementById('cancelEditBtn').style.display = "inline-block";
    }

    function cancelEdit() { editingEmpName = null; document.getElementById('employeeForm').querySelectorAll('input').forEach(i => { i.value = (i.type==='number'?0:''); i.disabled=false; }); document.getElementById('saveBtn').innerText = "儲存設定"; document.getElementById('cancelEditBtn').style.display = "none"; }
    async function updLv(id, s) { if(confirm(`核准此假單？`)) { showLoading("處理中..."); await fetch(CONFIG_URL,{method:'POST',body:JSON.stringify({action:"updateLeave",id,newStatus:s})}); await fetchData(); } }
    async function calcSalary() { const m=document.getElementById('rMonth').value; if(!m) return alert("選月份"); showLoading("大腦運算中..."); await fetch(CONFIG_URL,{method:'POST',body:JSON.stringify({action:"calculateSalary",targetMonth:m})}); await fetchData(); alert("結算完畢"); }
    function exportExcel() { if (!db.Salary_Summary || db.Salary_Summary.length <= 1) return alert("請先結算"); showLoading("匯出中..."); setTimeout(()=>{ const ws = XLSX.utils.aoa_to_sheet(db.Salary_Summary); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "薪資結算"); XLSX.writeFile(wb, "禾禾園薪資表.xlsx"); hideLoading(); },500); }
    async function makePDF() { const m=document.getElementById('rMonth').value; if(!m) return alert("選月份"); showLoading("生成 PDF 中..."); await fetch(CONFIG_URL,{method:'POST',body:JSON.stringify({action:"generatePDF",targetMonth:m})}); hideLoading(); alert("已存至雲端硬碟"); }

    fetchData();
</script>
</body>
</html>
