<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禾禾園 - 管理後台</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7fa; margin: 0; padding: 20px; color: #333; }
        h1, h2 { color: #2c3e50; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        
        /* 員工輸入區樣式 */
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 6px; }
        .input-group input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 150px; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        .btn-save { background-color: #28a745; color: white; }
        .btn-save:hover { background-color: #218838; }
        .btn-delete { background-color: #dc3545; color: white; padding: 5px 10px; font-size: 0.9em; }
        .btn-delete:hover { background-color: #c82333; }
        .btn-approve { background-color: #007bff; color: white; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f1f3f5; color: #495057; }
        tr:hover { background-color: #f8f9fa; }
        
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.85em; font-weight: bold; }
        .status-pending { background-color: #ffeeba; color: #856404; }
        .status-approved { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 禾禾園管理中心</h1>

    <div class="section" id="employee-section">
        <h2>👥 員工資料管理</h2>
        
        <div class="input-group">
            <input type="text" id="empName" placeholder="員工姓名 (必填)">
            <input type="text" id="empDept" placeholder="部門">
            <input type="number" id="empSalary" placeholder="月薪 (底薪)">
            <input type="text" id="empOnboarding" placeholder="到職日 (例: 2024/04/14)">
            <button onclick="saveEmployee()" class="btn-save">➕ 新增員工</button>
        </div>

        <table id="employeeTable">
            <thead>
                <tr>
                    <th>姓名</th>
                    <th>部門</th>
                    <th>月薪</th>
                    <th>到職日</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="employeeList">
                <tr><td colspan="5" style="text-align: center;">資料載入中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="section" id="leave-section">
        <h2>📝 待審核假單</h2>
        <table id="leaveTable">
            <thead>
                <tr>
                    <th>申請時間</th>
                    <th>姓名</th>
                    <th>假別</th>
                    <th>開始時間</th>
                    <th>結束時間</th>
                    <th>狀態</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="leaveList">
                <tr><td colspan="7" style="text-align: center;">資料載入中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 這裡已經換成您專屬的 Google Apps Script 網址了！
    const scriptURL = "https://script.google.com/macros/s/AKfycbx0clQCOIOULOi58C0ffABTWNEwDa3KFVUF0TK9FCcj-O1aFLtxWkIF0IOv7bn_Wml4RA/exec"; 

    // 頁面載入時自動抓取資料
    window.onload = function() {
        fetchData();
    };

    // 1. 抓取資料並渲染畫面
    function fetchData() {
        fetch(scriptURL)
            .then(response => response.json())
            .then(data => {
                renderEmployees(data.employees);
                renderLeaves(data.leave);
            })
            .catch(error => console.error("資料載入失敗:", error));
    }

    // --- 員工管理功能 ---

    function renderEmployees(data) {
        const list = document.getElementById('employeeList');
        list.innerHTML = '';
        if (!data || data.length <= 1) {
            list.innerHTML = '<tr><td colspan="5" style="text-align:center;">尚無員工資料</td></tr>';
            return;
        }
        
        // i=1 跳過標題列
        for (let i = 1; i < data.length; i++) {
            const row = data[i];
            if(!row[0]) continue; // 跳過空行
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${row[0]}</strong></td>
                <td>${row[1] || '-'}</td>
                <td>${row[3] || '0'}</td>
                <td>${row[4] || '-'}</td>
                <td>
                    <button onclick="deleteEmployee('${row[0]}')" class="btn-delete">🗑️ 刪除</button>
                </td>
            `;
            list.appendChild(tr);
        }
    }

    function saveEmployee() {
        const btn = document.querySelector('.btn-save');
        const name = document.getElementById('empName').value.trim();
        const dept = document.getElementById('empDept').value.trim();
        const salary = document.getElementById('empSalary').value.trim();
        const onboarding = document.getElementById('empOnboarding').value.trim();

        if (!name) { alert("⚠️ 請填寫員工姓名！"); return; }

        btn.innerText = "儲存中...";
        btn.disabled = true;

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ 
                action: "saveEmployee", 
                name: name, 
                dept: dept, 
                salary: salary, 
                onboardingDate: onboarding 
            })
        })
        .then(res => res.text())
        .then(() => {
            alert("✅ 員工新增成功！");
            document.getElementById('empName').value = '';
            document.getElementById('empDept').value = '';
            document.getElementById('empSalary').value = '';
            document.getElementById('empOnboarding').value = '';
            fetchData(); // 重新整理列表
        })
        .catch(err => alert("新增失敗：" + err))
        .finally(() => {
            btn.innerText = "➕ 新增員工";
            btn.disabled = false;
        });
    }

    function deleteEmployee(name) {
        if (!confirm("⚠️ 確定要刪除員工「" + name + "」嗎？此動作無法復原！")) return;

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ action: "deleteEmployee", name: name })
        })
        .then(res => res.text())
        .then(() => {
            alert("🗑️ 員工已刪除");
            fetchData(); // 重新整理列表
        })
        .catch(err => alert("刪除失敗：" + err));
    }

    // --- 請假審核功能 ---

    function renderLeaves(data) {
        const list = document.getElementById('leaveList');
        list.innerHTML = '';
        if (!data || data.length <= 1) {
            list.innerHTML = '<tr><td colspan="7" style="text-align:center;">目前無假單</td></tr>';
            return;
        }

        let hasPending = false;
        // i=1 跳過標題列
        for (let i = 1; i < data.length; i++) {
            const row = data[i];
            const status = row[8] || '';
            if (status !== "待主管審核") continue; // 只顯示待審核的

            hasPending = true;
            const tr = document.createElement('tr');
            
            // 格式化日期顯示
            const appDate = new Date(row[1]).toLocaleDateString() || '-';
            
            tr.innerHTML = `
                <td>${appDate}</td>
                <td><strong>${row[2]}</strong></td>
                <td>${row[4]}</td>
                <td>${row[5]}</td>
                <td>${row[6]}</td>
                <td><span class="status-badge status-pending">${status}</span></td>
                <td>
                    <button onclick="approveLeave('${row[0]}')" class="btn-approve">✅ 核准</button>
                </td>
            `;
            list.appendChild(tr);
        }

        if (!hasPending) {
            list.innerHTML = '<tr><td colspan="7" style="text-align:center;">🎉 目前沒有需要審核的假單</td></tr>';
        }
    }

    function approveLeave(id) {
        if (!confirm("確定要核准這張假單嗎？")) return;

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ action: "updateLeave", id: id, newStatus: "已生效" })
        })
        .then(res => res.text())
        .then(() => {
            alert("✅ 假單已核准！");
            fetchData();
        })
        .catch(err => alert("核准失敗：" + err));
    }
</script>

</body>
</html>
