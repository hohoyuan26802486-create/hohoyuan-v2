<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾禾園 - 專業管理後台 V13.6</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --warning: #f4b400; --danger: #d93025; --text-main: #3c4043; --text-sub: #70757a; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f1f3f4; color: var(--text-main); padding: 20px; margin: 0; }
        .container { max-width: 1350px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 1px 3px rgba(60,64,67,0.3); margin-bottom: 25px; }
        h1 { color: var(--text-main); font-size: 20px; font-weight: 500; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 15px; }
        
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1100px; }
        th { text-align: left; padding: 12px 15px; border-bottom: 2px solid #eee; color: var(--text-sub); font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #f1f1f1; vertical-align: middle; }
        
        .main-info { font-size: 16px; font-weight: 600; color: #202124; }
        .sub-info { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
        .ins-highlight { font-size: 17px; font-weight: bold; color: #000; }
        .bonus-text { color: var(--success); font-weight: bold; font-size: 13px; margin-top: 4px; }

        .proof-btn { 
            display: inline-flex; align-items: center; background: #f1f3f4; color: #5f6368 !important; 
            border: 1px solid #dadce0; padding: 6px 12px; border-radius: 20px; text-decoration: none;
            font-size: 13px; font-weight: bold; transition: 0.2s;
        }
        .proof-btn:hover { background: #e8eaed; border-color: var(--primary); color: var(--primary) !important; }

        .form-row { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; background: var(--bg-gray); padding: 20px; border-radius: 12px;}
        .input-group { display: flex; flex-direction: column; flex: 1 1 150px; }
        .input-group label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
        .input-group input, .input-group select { padding: 10px; border: 1px solid #dadce0; border-radius: 8px; font-size: 14px; outline:none; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-edit { background: white; border: 1px solid #dadce0; color: var(--text-main); }
        .btn-edit:hover { background: #f8f9fa; }
        
        .top-nav { background: #202124; color: white; display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; border-radius: 12px; margin-bottom: 20px; }
        
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div><div id="loadingText" style="font-weight:bold; color:#1a73e8;">處理中，請稍候...</div></div>

<div class="container top-nav">
    <div style="font-size:18px; font-weight:bold;">禾禾園 · 專業後台系統</div>
    <div style="display:flex; gap:10px;">
        <select id="adminRole" onchange="authRole()" style="background:#3c4043; color:white; border:none; padding:8px; border-radius:6px; outline:none;">
            <option value="業務部主管">業務部主管</option>
            <option value="生產部主管">生產部主管</option>
            <option value="運輸部主管">運輸部主管</option>
            <option value="倉儲部主管">倉儲部主管</option>
            <option value="會計部">會計部</option>
            <option value="人事部">人事部</option>
            <option value="副總">副總</option>
        </select>
        <button class="btn btn-primary" onclick="fetchData()">🔄 同步雲端資料</button>
    </div>
</div>

<div id="hrBox" class="container" style="display:none;">
    <h1>👥 員工名冊管理</h1>
    <div class="form-row" id="employeeForm">
        <div class="input-group"><label>姓名</label><input type="text" id="eName"></div>
        <div class="input-group"><label>部門</label><select id="eDept"><option>業務部</option><option>會計部</option><option>生產部</option><option>運輸部</option><option>倉儲部</option><option>人事部</option></select></div>
        <div class="input-group"><label>到職日</label><input type="date" id="eDate"></div>
        <div class="input-group"><label>底薪</label><input type="number" id="eSal"></div>
        <div class="input-group"><label>變動獎金</label><input type="number" id="eBonus" value="0"></div>
        <div class="input-group"><label>勞保</label><input type="number" id="eLabor" value="0"></div>
        <div class="input-group"><label>健保</label><input type="number" id="eHealth" value="0"></div>
        <div class="input-group"><label>眷屬口數</label><input type="number" id="eDependents" value="0"></div>
        <div style="display:flex; align-items:flex-end;">
            <button id="saveBtn" class="btn btn-primary" onclick="saveEmp()">💾 儲存設定</button>
            <button id="cancelBtn" class="btn btn-edit" style="display:none; margin-left:10px;" onclick="cancelEdit()">❌ 取消</button>
        </div>
    </div>
    <div class="table-responsive"><table><thead><tr><th>員工</th><th>特休天數</th><th>薪資/獎金</th><th>勞健保</th><th>操作</th></tr></thead><tbody id="empBody"></tbody></table></div>
</div>

<div class="container">
    <h1>📝 假單審核中心</h1>
    <div class="table-responsive"><table><thead><tr><th>姓名</th><th>起訖時間</th><th>假別</th><th>證明文件</th><th>狀態</th><th>核准操作</th></tr></thead><tbody id="leaveBody"></tbody></table></div>
</div>

<div id="reportBox" class="container" style="display:none;">
    <h1>📊 結算與報表</h1>
    <div style="display:flex; gap:15px; align-items:center; flex-wrap:wrap;">
        <input type="month" id="rMonth" style="padding:10px; border-radius:8px; border:1px solid #ccc;">
        <button class="btn btn-primary" onclick="calcSalary()">🧮 1. 結算薪資</button>
        <button class="btn btn-success" onclick="exportExcel()">📥 2. 匯出 Excel</button>
        <button class="btn btn-warning" onclick="makePDF()">📄 3. 生成 PDF</button>
    </div>
</div>

<script>
    // 🌟 這裡放回了您真正的後台網址！
    const CONFIG_URL = "https://script.google.com/macros/s/AKfycbx0clQCOIOULOi58C0ffABTWNEwDa3KFVUF0TK9FCcj-O1aFLtxWkIF0IOv7bn_Wml4RA/exec";
    let db = {}; let editingEmpName = null;

    function formatTime(timeStr) {
        if (!timeStr) return "";
        const d = new Date(timeStr); if (isNaN(d)) return timeStr;
        const pad = (n) => n.toString().padStart(2, '0');
        return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function showLoading(t){ document.getElementById('loadingText').innerText=t; document.getElementById('loadingOverlay').style.display='flex'; }
    function hideLoading(){ document.getElementById('loadingOverlay').style.display='none'; }

    // 權限控制
    function authRole() {
        const r = document.getElementById('adminRole').value;
        if((r==='人事部' || r==='會計部' || r==='副總') && prompt("請輸入管理員密碼")!=="123") {
            document.getElementById('adminRole').value="業務部主管";
        }
        render();
    }

    async function fetchData() { 
        showLoading("正在獲取最新資料...");
        try { 
            const res = await fetch(CONFIG_URL); 
            db = await res.json(); 
            render(); 
        } catch(e) {
            alert("網路連線異常，請確認網址或重整頁面。");
        } finally { hideLoading(); }
    }

    function render() {
        const role = document.getElementById('adminRole').value;
        const isHR = role === '人事部' || role === '副總';
        document.getElementById('hrBox').style.display = isHR ? 'block' : 'none';
        document.getElementById('reportBox').style.display = (isHR || role === '會計部') ? 'block' : 'none';

        if(db.employees && db.leave) {
            document.getElementById('empBody').innerHTML = db.employees.filter(r=>r[0]!=="姓名" && r[0]!=="").map(r => {
                const used = db.leave.filter(l => l[2] === r[0] && l[4] === "特休" && l[8] === "已生效").length;
                return `<tr>
                    <td><div class="main-info">${r[0]}</div><div class="sub-info">${r[1]} · ${r[4]?formatTime(r[4]).split(' ')[0]:''}</div></td>
                    <td><div class="ins-highlight" style="color:#d93025;">剩 ${Number(r[5])-used} 天</div><div class="sub-info">總額 ${r[5]} 天</div></td>
                    <td><div class="ins-highlight">$${r[3]}</div><div class="bonus-text">獎金: $${r[6]||0}</div></td>
                    <td><div class="sub-info">勞保: <strong>$${r[7]||0}</strong></div><div class="sub-info">健保: <strong>$${r[8]||0}</strong> (${r[9]||0}口)</div></td>
                    <td><button class="btn btn-edit" onclick="startEdit('${r[0]}','${r[1]}','${r[3]}','${r[4]}','${r[7]}','${r[8]}','${r[9]}','${r[6]}')">✏️ 修改</button></td>
                </tr>`;
            }).join('');
        }

        if(db.leave) {
            document.getElementById('leaveBody').innerHTML = db.leave.filter(r=>r[0]!=="ID" && r[0]!=="").reverse().map(r => {
                let next = (role.includes(r[3]) && r[8]==='待主管審核') ? '待人事審核' : (role==='人事部' && r[8]==='待人事審核') ? '待副總審核' : (role==='副總' && r[8]==='待副總審核') ? '已生效' : '';
                let proof = (r[9] && r[9].includes('http')) ? `<a href="${r[9]}" target="_blank" class="proof-btn">📎 查看單據</a>` : `<span style="color:#ccc">無</span>`;
                return `<tr><td><div class="main-info">${r[2]}</div><div class="sub-info">${r[3]}</div></td><td>${formatTime(r[5])}<br>~ ${formatTime(r[6])}</td><td>${r[4]}</td><td>${proof}</td><td><span style="font-weight:bold; color:${r[8]==='已生效'?'#28a745':'#f4b400'}">${r[8]}</span></td><td>${next?`<button class="btn btn-success" onclick="updLv('${r[0]}','${next}')">核准</button>`:'-'}</td></tr>`;
            }).join('');
        }
    }

    // 🌟 防止轉圈圈的防呆設計
    async function updLv(id, s) {
        if(!confirm(`確認核准狀態為：${s} ？`)) return;
        showLoading("核准處理中，請稍候...");
        
        const timeout = setTimeout(() => {
            hideLoading();
            alert("⚠️ 伺服器回應較慢，已為您解除等待。請重按「同步」確認狀態。");
        }, 15000);

        try {
            await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify({ action: "updateLeave", id: id, newStatus: s })});
            clearTimeout(timeout);
            await fetchData();
            alert("✅ 審核完成！");
        } catch (e) {
            clearTimeout(timeout);
            hideLoading();
            alert("發生錯誤，請重試");
        }
    }

    function startEdit(name, dept, sal, date, labor, health, dependents, bonus) {
        editingEmpName = name; document.getElementById('eName').value = name; document.getElementById('eName').disabled = true;
        document.getElementById('eDept').value = dept; document.getElementById('eSal').value = sal;
        if(date) document.getElementById('eDate').value = new Date(date).toISOString().split('T')[0];
        document.getElementById('eLabor').value = labor; document.getElementById('eHealth').value = health;
        document.getElementById('eDependents').value = dependents; document.getElementById('eBonus').value = bonus;
        document.getElementById('saveBtn').innerText = "💾 確認修改";
        document.getElementById('cancelBtn').style.display = "inline-block";
        window.scrollTo(0,0);
    }

    function cancelEdit() {
        editingEmpName = null; 
        document.getElementById('employeeForm').querySelectorAll('input').forEach(i => { i.value = (i.type==='number'?0:''); i.disabled=false; }); 
        document.getElementById('saveBtn').innerText = "💾 儲存設定"; 
        document.getElementById('cancelBtn').style.display = "none";
    }

    async function saveEmp() { 
        showLoading("儲存資料中...");
        const d = { action: editingEmpName ? "editEmployee" : "saveEmployee", name: document.getElementById('eName').value, dept: document.getElementById('eDept').value, onboardingDate: document.getElementById('eDate').value, salary: document.getElementById('eSal').value, laborIns: document.getElementById('eLabor').value, healthIns: document.getElementById('eHealth').value, dependents: document.getElementById('eDependents').value, bonus: document.getElementById('eBonus').value };
        await fetch(CONFIG_URL, {method:'POST', body:JSON.stringify(d)}); 
        cancelEdit();
        await fetchData(); 
    }

    async function calcSalary() { const m=document.getElementById('rMonth').value; if(!m) return alert("請先選取月份"); showLoading("正在結算薪資..."); await fetch(CONFIG_URL, {method:'POST', body:JSON.stringify({action:"calculateSalary", targetMonth:m})}); await fetchData(); alert("結算完成"); }
    function exportExcel() {
        if (!db.Salary_Summary || db.Salary_Summary.length <= 1) return alert("請先點擊「結算薪資」");
        const month = document.getElementById('rMonth').value || "報表";
        const ws = XLSX.utils.aoa_to_sheet(db.Salary_Summary);
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "薪資結算");
        XLSX.writeFile(wb, `禾禾園薪資結算_${month}.xlsx`);
    }
    async function makePDF() { const m=document.getElementById('rMonth').value; if(!m) return alert("請先選取月份"); showLoading("PDF生成中..."); await fetch(CONFIG_URL, {method:'POST', body:JSON.stringify({action:"generatePDF", targetMonth:m})}); hideLoading(); alert("已存至雲端"); }
    
    fetchData();
</script>
</body>
</html>
