<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209935.png">
    <title>禾禾園 - 員工系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 450px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #1a73e8; }
        .tab { flex: 1; text-align: center; padding: 15px 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; opacity: 0.7; font-size: 15px;}
        .tab.active { opacity: 1; border-bottom: 4px solid #fff; background: #155db1; }
        .form-content { padding: 25px 20px; display: none; }
        .form-content.active { display: block; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 14px; font-weight: bold; color: #444; margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; background-color: white; }
        .btn-submit { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
        .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .radio-group label { flex: 1; text-align: center; background: #eee; padding: 12px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; font-size: 14px; min-width: 120px; }
        .radio-group input { display: none; }
        .radio-group input:checked + label { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('clockIn')">📍 打卡</div>
        <div class="tab" onclick="switchTab('leave')">📝 請假</div>
    </div>

    <div id="clockIn" class="form-content active">
        <div class="input-group"><label>👤 員工姓名</label><select id="attName"></select></div>
        <div class="input-group"><label>🏢 所屬部門</label>
            <select id="attDept">
                <option>業務部</option><option>會計部</option><option>生產部</option>
                <option>運輸部</option><option>倉儲部</option><option>人事部</option>
            </select>
        </div>
        <div class="input-group"><label>⏱️ 上下班</label>
            <div class="radio-group">
                <input type="radio" name="attType" id="typeIn" value="上班" checked onchange="updateDynamicStatus()"><label for="typeIn">上班</label>
                <input type="radio" name="attType" id="typeOut" value="下班" onchange="updateDynamicStatus()"><label for="typeOut">下班</label>
            </div>
        </div>
        <div class="input-group"><label>⚡ 狀態選項</label><div class="radio-group" id="dynamicStatus"></div></div>
        
        <div id="unlockBox" style="display:none; text-align:right; margin-bottom:10px;"><span style="font-size: 12px; color: #d63384; font-weight: bold; cursor: pointer; text-decoration: underline;" onclick="unlockDevice()">🔑 HR 解除設備綁定</span></div>
        <button id="btnAtt" class="btn-submit" onclick="submitAttendance()">送出打卡</button>
    </div>

    <div id="leave" class="form-content">
        <div class="input-group"><label>👤 員工姓名</label><select id="lvName"></select></div>
        <div class="input-group"><label>🏢 所屬部門</label>
            <select id="lvDept">
                <option>業務部</option><option>會計部</option><option>生產部</option>
                <option>運輸部</option><option>倉儲部</option><option>人事部</option>
            </select>
        </div>
        <div class="input-group"><label>📌 假別選擇</label>
            <select id="lvType">
                <option value="事假">事假 (無薪)</option><option value="病假">病假 (半薪)</option>
                <option value="生理假">生理假 (半薪)</option><option value="家庭照顧假">家庭照顧假 (無薪)</option>
                <option value="特休">特休 (全薪)</option><option value="補休">補休 (全薪)</option>
                <option value="婚假">婚假 (全薪)</option><option value="喪假">喪假 (全薪)</option>
                <option value="產假">產假 (全薪)</option><option value="公傷病假">公傷病假 (全薪)</option>
                <option value="公假">公假 (全薪)</option>
            </select>
        </div>
        <div class="input-group"><label>📅 開始時間</label><input type="datetime-local" id="lvStart" required></div>
        <div class="input-group"><label>📅 結束時間</label><input type="datetime-local" id="lvEnd" required></div>
        <div class="input-group"><label>📝 請假事由</label><input type="text" id="lvReason" placeholder="請簡述事由" required></div>
        
        <button id="btnLv" class="btn-submit" onclick="submitLeave()">送出假單</button>
    </div>
</div>

<script>
    const CONFIG_URL = "https://script.google.com/macros/s/AKfycbx0clQCOIOULOi58C0ffABTWNEwDa3KFVUF0TK9FCcj-O1aFLtxWkIF0IOv7bn_Wml4RA/exec";

    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active'); document.getElementById(tabId).classList.add('active');
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`; const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift()); return null;
    }
    function setCookie(name, value) {
        const d = new Date(); d.setTime(d.getTime() + (3650 * 24 * 60 * 60 * 1000)); 
        document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/";
    }
    function unlockDevice() {
        if (prompt("🔒 請輸入人事部解鎖密碼：") === "123") {
            document.cookie = "bound_employee=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            alert("🔓 設備已成功解除綁定！"); window.location.reload(); 
        } else { alert("❌ 密碼錯誤！"); }
    }

    async function fetchEmployees() {
        try {
            const res = await fetch(CONFIG_URL); const data = await res.json();
            const empList = data.employees.filter(r => r[0] && r[0] !== "姓名");
            let optionsHTML = '<option value="" disabled selected>👉 請選擇您的姓名</option>';
            empList.forEach(emp => { optionsHTML += `<option value="${emp[0]}">${emp[0]} (${emp[1]})</option>`; });
            ['attName', 'lvName'].forEach(id => document.getElementById(id).innerHTML = optionsHTML);

            const boundName = getCookie('bound_employee');
            if (boundName) {
                ['attName', 'lvName'].forEach(id => { let el = document.getElementById(id); el.value = boundName; el.disabled = true; });
                document.getElementById('unlockBox').style.display = "block";
                const hiddenInput = document.createElement("input"); hiddenInput.type = "hidden"; hiddenInput.id = "hiddenAttName"; hiddenInput.value = boundName;
                document.getElementById('clockIn').appendChild(hiddenInput);
            }
        } catch (e) { document.getElementById('attName').innerHTML = '<option value="">⚠️ 連線失敗，請重新整理</option>'; }
    }

    function updateDynamicStatus() {
        const type = document.querySelector('input[name="attType"]:checked').value;
        const container = document.getElementById('dynamicStatus');
        const now = new Date(); const totalMinutes = now.getHours() * 60 + now.getMinutes();
        if (type === '上班') {
            container.innerHTML = (totalMinutes <= 440) ? `<input type="radio" name="attStatus" id="s2" value="個人因素提早上班" checked><label for="s2">個人因素提早上班</label>` : `<input type="radio" name="attStatus" id="s1" value="正常" checked><label for="s1">正常</label>`;
        } else {
            container.innerHTML = (totalMinutes >= 1010) ? `<input type="radio" name="attStatus" id="s3" value="個人因素延後下班" checked><label for="s3">個人因素延後下班</label><input type="radio" name="attStatus" id="s4" value="經主管核准加班"><label for="s4">經主管核准加班</label>` : `<input type="radio" name="attStatus" id="s1" value="正常" checked><label for="s1">正常</label>`;
        }
    }

    document.addEventListener("DOMContentLoaded", () => { updateDynamicStatus(); fetchEmployees(); setInterval(updateDynamicStatus, 60000); });

    async function submitAttendance() {
        const name = document.getElementById('hiddenAttName') ? document.getElementById('hiddenAttName').value : document.getElementById('attName').value;
        const dept = document.getElementById('attDept').value;
        const type = document.querySelector('input[name="attType"]:checked').value;
        const status = document.querySelector('input[name="attStatus"]:checked').value;
        if (!name) return alert("請選擇姓名！");
        
        const boundName = getCookie('bound_employee');
        if (boundName && boundName !== name) return alert(`這支手機已綁定 ${boundName}`);
        
        const btn = document.getElementById('btnAtt'); btn.innerText = "⏳ 傳送中..."; btn.disabled = true;
        const payload = { action: "write", sheetName: "attendance", name: name, dept: dept, type: type, status: status };
        try {
            await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert(`✅ 打卡成功！`); if (!boundName) { setCookie('bound_employee', name); window.location.reload(); }
        } catch (e) { alert("連線失敗。"); } finally { btn.innerText = "送出打卡"; btn.disabled = false; updateDynamicStatus(); }
    }

    async function submitLeave() {
        const name = document.getElementById('hiddenAttName') ? document.getElementById('hiddenAttName').value : document.getElementById('lvName').value;
        const dept = document.getElementById('lvDept').value;
        const type = document.getElementById('lvType').value;
        const start = document.getElementById('lvStart').value;
        const end = document.getElementById('lvEnd').value;
        const reason = document.getElementById('lvReason').value.trim();

        if (!name || !start || !end || !reason) return alert("⚠️ 請填寫完整！");

        const btn = document.getElementById('btnLv'); btn.innerText = "⏳ 傳送中..."; btn.disabled = true;
        
        const payload = { action: "write", sheetName: "leave", name, dept, leaveType: type, start, end, reason };
        try { await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(payload) }); alert("✅ 假單已送出。"); location.reload(); } 
        catch (e) { alert("連線失敗"); document.getElementById('btnLv').innerText = "送出假單"; document.getElementById('btnLv').disabled = false; }
    }
</script>
</body>
</html>
