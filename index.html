<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾禾園 - 員工出勤系統</title>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #d93025; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #eef2f7; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 480px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 18px 10px; color: #5f6368; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 16px;}
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #f8faff; }
        .form-content { padding: 25px; display: none; }
        .form-content.active { display: block; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; color: #3c4043; margin-bottom: 8px; }
        .input-group select, .input-group input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        
        .type-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-toggle label { flex: 1; text-align: center; padding: 12px; border: 1px solid #dadce0; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; background: #f8f9fa; }
        .type-toggle input { display: none; }
        .type-toggle input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        .gps-box { padding: 12px; border-radius: 10px; text-align: center; font-size: 14px; font-weight: 600; margin-bottom: 20px; transition: 0.3s; }
        .gps-ok { background: #e6fffa; color: #234e52; border: 1px solid #38b2ac; }
        .gps-fail { background: #fff5f5; color: #742a2a; border: 1px solid #feb2b2; }
        .gps-off { background: #f0f4f8; color: #334e68; border: 1px solid #cbd5e0; }

        .btn-submit { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
        .btn-submit:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('clockIn')">📍 打卡</div>
        <div class="tab" onclick="switchTab('leave')">📝 請假</div>
        <div class="tab" onclick="switchTab('proofTab')">📎 補件</div>
    </div>

    <div id="clockIn" class="form-content active">
        <div class="input-group"><label>👤 員工姓名</label><select id="attName"></select></div>
        <div class="input-group"><label>🏢 所屬部門</label>
            <select id="attDept">
                <option>業務部</option><option>會計部</option><option>生產部</option>
                <option>運輸部</option><option>倉儲部</option><option>人事部</option>
            </select>
        </div>
        
        <label style="font-size: 14px; font-weight: 600; color: #3c4043;">⏱️ 上下班切換</label>
        <div class="type-toggle">
            <input type="radio" name="attType" id="typeIn" value="上班" checked onchange="handleTypeChange()">
            <label for="typeIn">上班打卡</label>
            <input type="radio" name="attType" id="typeOut" value="下班" onchange="handleTypeChange()">
            <label for="typeOut">下班打卡</label>
        </div>

        <div id="gpsStatusBox" class="gps-box gps-fail">🛰️ 正在確認位置中...</div>
        
        <button id="btnAtt" class="btn-submit" onclick="submitAttendance()">送出打卡</button>
    </div>

    <div id="leave" class="form-content">...</div>
    <div id="proofTab" class="form-content">...</div>
</div>

<script>
    const CONFIG_URL = "https://script.google.com/macros/s/AKfycbx0clQCOIOULOi58C0ffABTWNEwDa3KFVUF0TK9FCcj-O1aFLtxWkIF0IOv7bn_Wml4RA/exec";
    
    // 🌍 禾禾園精確座標設定
    const TARGET_LAT = 24.956646; 
    const TARGET_LON = 121.393925;
    const ALLOWED_DIST = 1.0; // 1 公里

    let userLat = null, userLon = null;
    let isWithinRange = false;

    // 計算距離 (Haversine 公式)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // 更新位置與顯示
    function updateLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude;
            userLon = pos.coords.longitude;
            const dist = getDistance(userLat, userLon, TARGET_LAT, TARGET_LON);
            isWithinRange = dist <= ALLOWED_DIST;
            handleTypeChange(); // 根據目前選擇的上下班狀態更新顯示
        }, err => {
            document.getElementById('gpsStatusBox').innerText = "❌ 請開啟手機 GPS 權限";
        }, { enableHighAccuracy: true });
    }

    // 🌟 核心：根據上下班狀態切換 GPS 限制
    function handleTypeChange() {
        const type = document.querySelector('input[name="attType"]:checked').value;
        const statusBox = document.getElementById('gpsStatusBox');
        const btn = document.getElementById('btnAtt');

        if (type === "下班") {
            statusBox.innerText = "✅ 下班打卡：不限位置";
            statusBox.className = "gps-box gps-off";
            btn.disabled = false;
        } else {
            // 上班打卡邏輯
            if (userLat === null) {
                statusBox.innerText = "🛰️ 定位中...";
                statusBox.className = "gps-box gps-fail";
                btn.disabled = true;
            } else if (isWithinRange) {
                statusBox.innerText = "✅ 已進入打卡範圍 (1km內)";
                statusBox.className = "gps-box gps-ok";
                btn.disabled = false;
            } else {
                statusBox.innerText = "❌ 距離太遠，無法上班打卡";
                statusBox.className = "gps-box gps-fail";
                btn.disabled = true;
            }
        }
    }

    async function submitAttendance() {
        const name = document.getElementById('attName').value;
        const type = document.querySelector('input[name="attType"]:checked').value;
        const dept = document.getElementById('attDept').value;
        
        if (!name) return alert("請選擇姓名");

        // 再次安全檢查：如果是上班但不在範圍內
        if (type === "上班" && !isWithinRange) return alert("您不在打卡範圍內！");

        const btn = document.getElementById('btnAtt');
        btn.innerText = "⏳ 傳送中..."; btn.disabled = true;

        try {
            const payload = { action: "write", sheetName: "attendance", name: name, dept: dept, type: type, status: "正常" };
            await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert(`✅ ${type}成功！`);
            location.reload();
        } catch (e) {
            alert("連線失敗");
            btn.innerText = "送出打卡"; btn.disabled = false;
        }
    }

    // 分頁切換
    function switchTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-content').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(id).classList.add('active');
    }

    // 初始化
    window.onload = () => {
        // 這裡放您原本的讀取員工清單代碼
        fetchEmployees(); 
        updateLocation();
        setInterval(updateLocation, 10000); // 每10秒校準一次位置
    };

    // (其餘 fetchEmployees 等輔助函式請保留您原本的內容)
</script>
</body>
</html>
