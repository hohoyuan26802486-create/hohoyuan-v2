<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾禾園 - 考勤系統 V16.2</title>
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #eef2f7; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 480px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 18px 10px; color: #5f6368; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 16px;}
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #f8faff; }
        
        .form-content { padding: 25px; display: none; }
        .form-content.active { display: block; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; color: #3c4043; margin-bottom: 8px; }
        .input-group select, .input-group input { 
            width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 10px; font-size: 16px; 
            background-color: white; box-sizing: border-box; outline: none; -webkit-appearance: none; appearance: none;
        }
        select:disabled { background-color: #e9ecef; color: #6c757d; font-weight: bold; cursor: not-allowed; opacity: 1; border-color: #ced4da; }
        
        .type-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-toggle label { flex: 1; text-align: center; padding: 12px; border: 1px solid #dadce0; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; background: #f8f9fa; }
        .type-toggle input { display: none; }
        .type-toggle input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        .status-options { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .status-btn { flex: 1; min-width: 140px; padding: 12px; border: 1px solid #dadce0; border-radius: 10px; text-align: center; font-size: 14px; cursor: pointer; background: #f8f9fa; font-weight: 600; }
        .status-btn.selected { background: #e8f0fe; border-color: var(--primary); color: var(--primary); }

        .gps-box { padding: 12px; border-radius: 10px; text-align: center; font-size: 14px; font-weight: 600; margin-bottom: 20px; display: none; }
        .gps-ok { background: #e6fffa; color: #234e52; border: 1px solid #38b2ac; display: block; }
        .gps-fail { background: #fff5f5; color: #742a2a; border: 1px solid #feb2b2; display: block; }

        .btn-submit { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        
        #unlockLink { text-align: right; margin-bottom: 10px; }
        #unlockLink a { font-size: 12px; color: var(--danger); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('clockIn')">📍 打卡</div>
        <div class="tab" onclick="switchTab('leave')">📝 請假</div>
        <div class="tab" onclick="switchTab('proofTab')">📎 補件</div>
    </div>

    <div id="clockIn" class="form-content active">
        <div class="input-group"><label>👤 員工姓名</label><select id="attName" onchange="syncName(this.value)"></select></div>
        <div id="unlockLink"><a href="#" onclick="unlockDevice()">🔑 解除手機鎖定 (HR 專用)</a></div>
        
        <div class="type-toggle">
            <input type="radio" name="attType" id="typeIn" value="上班" checked onchange="handleTypeChange()">
            <label for="typeIn">上班打卡</label>
            <input type="radio" name="attType" id="typeOut" value="下班" onchange="handleTypeChange()">
            <label for="typeOut">下班打卡</label>
        </div>

        <div id="statusArea">
            <label style="font-size: 14px; font-weight: 600; color: #3c4043;">⏱️ 自動狀態判定</label>
            <div id="statusList" class="status-options" style="margin-top:8px;"></div>
        </div>

        <div class="input-group" id="overtimeBox" style="display: none; background: #fff3cd; padding: 15px; border-radius: 10px; border: 1px solid #ffe69c;">
            <label style="color: #856404;">📝 請填寫加班事由</label>
            <input type="text" id="overtimeReason" placeholder="例如：處理急件、庫存盤點..." style="border-color: #ffe69c;">
        </div>

        <div id="gpsStatusBox" class="gps-box"></div>
        <button id="btnAtt" class="btn-submit" onclick="submitAttendance()">送出打卡</button>
    </div>

    <div id="leave" class="form-content">
        <div class="input-group"><label>👤 員工姓名</label><select id="lvName" onchange="syncName(this.value)"></select></div>
        <div class="input-group">
            <label>📌 假別選擇</label>
            <select id="lvType" onchange="handleLeaveTypeChange()" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 12px top 50%; background-size: 12px auto;">
                <option value="事假">事假</option><option value="病假">病假</option><option value="生理假">生理假</option><option value="特休">特休</option><option value="公假">公假</option><option value="婚假">婚假</option><option value="喪假">喪假</option><option value="產假">產假</option><option value="其他">其他</option>
            </select>
            <div id="annualLeaveBox" style="display: none; margin-top: 10px; padding: 12px; background: #e8f0fe; border-radius: 8px; border: 1px solid #aecbfa; color: #1a73e8; font-size: 14px; font-weight: bold;">
                🏖️ 目前特休餘額：<span id="annualLeaveCount" style="color: #d93025; font-size: 18px;">-</span> 天
            </div>
        </div>
        <div class="input-group"><label>📅 開始時間</label><input type="datetime-local" id="lvStart"></div>
        <div class="input-group"><label>📅 結束時間</label><input type="datetime-local" id="lvEnd"></div>
        <div class="input-group"><label>📝 請假事由</label><input type="text" id="lvReason" placeholder="填寫簡要原因"></div>
        <div class="input-group">
            <label>📸 證明照片 (選填)</label>
            <input type="file" id="lvFile" accept="image/*">
            <div style="margin-top: 10px; padding: 12px; background-color: #fce8e6; border-left: 4px solid #d93025; border-radius: 8px; font-size: 13.5px; color: #d93025; font-weight: bold; line-height: 1.5;">
                ⚠️ 溫馨提醒：<br>如請假需附上相關資料時，請於 3 天內附上（或事後至上方「補件」區上傳），逾期視同作廢！謝謝！
            </div>
        </div>
        <button id="btnLv" class="btn-submit" onclick="submitLeave()">送出假單</button>
    </div>

    <div id="proofTab" class="form-content">
        <div class="input-group"><label>👤 員工姓名</label><select id="prfName" onchange="syncName(this.value); loadPendingProofs();"></select></div>
        <div class="input-group"><label>📝 選擇缺件假單</label><select id="prfSelect"><option value="">讀取中...</option></select></div>
        <div class="input-group"><label>📸 上傳證明照片</label><input type="file" id="prfFile" accept="image/*"></div>
        <button id="btnPrf" class="btn-submit" onclick="submitProof()">送出補件</button>
    </div>
</div>

<script>
    // ✅ 網址鎖定
    const CONFIG_URL = "https://script.google.com/macros/s/AKfycbx0clQCOIOULOi58C0ffABTWNEwDa3KFVUF0TK9FCcj-O1aFLtxWkIF0IOv7bn_Wml4RA/exec";
    
    const TARGET_LAT = 24.956646; const TARGET_LON = 121.393925; const ALLOWED_DIST = 1.0; 
    let userLat = null, userLon = null, isWithinRange = false, globalDB = null, selectedStatus = "";

    function syncName(name) {
        if(!name) return;
        document.getElementById('attName').value = name;
        document.getElementById('lvName').value = name;
        document.getElementById('prfName').value = name;
        handleLeaveTypeChange(); 
    }

    function handleLeaveTypeChange() {
        const type = document.getElementById('lvType').value;
        const box = document.getElementById('annualLeaveBox');
        if(!box) return;

        if (type === '特休') {
            box.style.display = 'block';
            updateAnnualLeave(document.getElementById('lvName').value);
        } else {
            box.style.display = 'none';
        }
    }

    function updateAnnualLeave(name) {
        if (!globalDB || !globalDB.employees || !globalDB.leave) return;
        const emp = globalDB.employees.find(r => r[0] === name);
        if (!emp) return;
        const totalLeave = Number(emp[5]) || 0; 
        const usedLeave = globalDB.leave.filter(r => r[2] === name && r[4] === "特休" && r[8] === "已生效").length;
        const remain = totalLeave - usedLeave;
        const countSpan = document.getElementById('annualLeaveCount');
        if(countSpan) countSpan.innerText = remain;
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function handleTypeChange() {
        try {
            const typeInput = document.querySelector('input[name="attType"]:checked');
            if(!typeInput) return;
            const type = typeInput.value;
            const statusBox = document.getElementById('gpsStatusBox');
            const list = document.getElementById('statusList');
            const overtimeBox = document.getElementById('overtimeBox');
            if(overtimeBox) overtimeBox.style.display = "none";

            const now = new Date(); const time = now.getHours() * 60 + now.getMinutes();
            if(list) list.innerHTML = "";

            if (type === "上班") {
                if(statusBox) statusBox.style.display = "block";
                if (time < 440) addStatusBtn("個人因素提早上班", true);
                else if (time >= 440 && time <= 450) addStatusBtn("正常上班", true);
                else addStatusBtn("遲到", true);
                updateGPSUI();
            } else {
                if(statusBox) statusBox.style.display = "none";
                if (time >= 1010) { 
                    addStatusBtn("因個人因素延後下班", true);
                    addStatusBtn("經主管核准加班", false);
                } else { addStatusBtn("正常下班", true); }
                const btnAtt = document.getElementById('btnAtt');
                if(btnAtt) btnAtt.disabled = false;
            }
        } catch(e) { console.error(e); }
    }

    function addStatusBtn(txt, isSelected) {
        const div = document.createElement('div');
        div.className = isSelected ? "status-btn selected" : "status-btn";
        div.innerText = txt;
        if(isSelected) {
            selectedStatus = txt;
            const ob = document.getElementById('overtimeBox');
            if(ob) ob.style.display = (txt === "經主管核准加班") ? "block" : "none";
        }
        div.onclick = function() {
            document.querySelectorAll('#statusList .status-btn').forEach(b => b.classList.remove('selected'));
            div.classList.add('selected'); selectedStatus = txt;
            const ob = document.getElementById('overtimeBox');
            if(ob) ob.style.display = (txt === "經主管核准加班") ? "block" : "none";
        };
        const statusList = document.getElementById('statusList');
        if(statusList) statusList.appendChild(div);
    }

    function updateGPSUI() {
        const box = document.getElementById('gpsStatusBox');
        const btn = document.getElementById('btnAtt');
        if(!box || !btn) return;
        if (userLat === null) { box.innerText = "🛰️ 定位中..."; box.className = "gps-box gps-fail"; btn.disabled = true; } 
        else if (isWithinRange) { box.innerText = "✅ 進入打卡範圍"; box.className = "gps-box gps-ok"; btn.disabled = false; } 
        else { box.innerText = "❌ 距離太遠，請回公司"; box.className = "gps-box gps-fail"; btn.disabled = true; }
    }

    async function fetchEmployees() {
        try {
            const res = await fetch(CONFIG_URL); globalDB = await res.json();
            const opts = globalDB.employees.filter(r => r[0] !== "姓名" && r[0] !== "").map(r => `<option value="${r[0]}">${r[0]}</option>`).join('');
            document.getElementById('attName').innerHTML = opts; 
            document.getElementById('lvName').innerHTML = opts; 
            document.getElementById('prfName').innerHTML = opts;
            const bound = localStorage.getItem('bound_user');
            if(bound) {
                document.getElementById('attName').value = bound; document.getElementById('attName').disabled = true;
                document.getElementById('lvName').value = bound; document.getElementById('lvName').disabled = true;
                document.getElementById('prfName').value = bound; document.getElementById('prfName').disabled = true;
                syncName(bound); 
            } else { syncName(document.getElementById('attName').value); }
            loadPendingProofs();
        } catch (e) { console.error(e); }
    }

    function unlockDevice() {
        if (prompt("🔐 HR 密碼：") === "456") {
            localStorage.removeItem('bound_user'); alert("🔓 已解除鎖定"); location.reload();
        } else { alert("❌ 密碼錯誤"); }
    }

    async function submitAttendance() {
        const name = document.getElementById('attName').value;
        const type = document.querySelector('input[name="attType"]:checked').value;
        const overtimeReason = document.getElementById('overtimeReason') ? document.getElementById('overtimeReason').value : "";
        
        if (selectedStatus === "經主管核准加班" && !overtimeReason.trim()) return alert("⚠️ 請填寫加班事由");
        
        const btn = document.getElementById('btnAtt'); 
        btn.innerText = "⏳ 傳送中..."; 
        btn.disabled = true;
        
        try {
            const response = await fetch(CONFIG_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: "write", sheetName: "attendance", name: name, type: type, status: selectedStatus, reason: overtimeReason, lat: userLat, lon: userLon }) 
            });
            
            const result = await response.text();

            if (result === "Duplicate") {
                alert(`⚠️ 系統溫馨提示：\n${name}，您今天已經打過【${type}】卡囉！\n(系統已自動攔截，不會重複紀錄)`);
                btn.disabled = false;
                btn.innerText = "送出打卡";
            } else if (result === "Success") {
                if (!localStorage.getItem('bound_user')) localStorage.setItem('bound_user', name);
                alert("✅ 打卡成功！辛苦了！"); 
                location.reload();
            } else {
                alert("❌ 發生錯誤：" + result);
                btn.disabled = false;
                btn.innerText = "送出打卡";
            }
        } catch (e) { 
            alert("❌ 連線失敗，請確認網路狀態！"); 
            btn.disabled = false; 
            btn.innerText = "送出打卡"; 
        }
    }

    async function submitLeave() {
        const leaveType = document.getElementById('lvType').value;
        if (leaveType === "特休") {
            const remain = Number(document.getElementById('annualLeaveCount').innerText);
            if (remain <= 0) return alert("⚠️ 特休天數不足");
        }
        const file = document.getElementById('lvFile').files[0];
        const btn = document.getElementById('btnLv'); btn.innerText = "⏳..."; btn.disabled = true;
        const p = { action: "write", sheetName: "leave", name: document.getElementById('lvName').value, leaveType, start: document.getElementById('lvStart').value, end: document.getElementById('lvEnd').value, reason: document.getElementById('lvReason').value };
        
        // 🌟 這裡就是送出假單後的強制彈出提示詞！
        const successMessage = "✅ 假單已成功送出！請等待主管審核。\n\n⚠️ 溫馨提醒：\n如請假需附上相關資料時，請於 3 天內附上，逾期視同作廢！謝謝！";

        if (file) {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = async () => { p.imageFile = r.result; p.fileName = file.name; await sendData(p, successMessage); };
        } else {
            await sendData(p, successMessage);
        }
    }

    function loadPendingProofs() {
        const name = document.getElementById('prfName').value;
        if (!globalDB || !globalDB.leave) return;
        const pending = globalDB.leave.filter(r => r[2] === name && r[4] !== "特休" && (!r[9] || !String(r[9]).includes('http')));
        const sel = document.getElementById('prfSelect');
        if(!sel) return;
        if (pending.length === 0) { sel.innerHTML = '<option value="">🎉 目前無補件需求</option>'; sel.disabled = true; } 
        else { sel.innerHTML = pending.map(r => `<option value="${r[0]}">${String(r[5]).split('T')[0]} - ${r[4]}</option>`).join(''); sel.disabled = false; }
    }

    async function submitProof() {
        const file = document.getElementById('prfFile').files[0];
        if (!file) return alert("請選擇照片");
        const r = new FileReader(); r.readAsDataURL(file);
        const btn = document.getElementById('btnPrf'); btn.innerText = "上傳中⏳..."; btn.disabled = true;
        
        r.onload = async () => { 
            await sendData({ action: "uploadLeaveProof", id: document.getElementById('prfSelect').value, name: document.getElementById('prfName').value, imageFile: r.result, fileName: file.name }, "✅ 證明照片補件成功！"); 
        };
    }

    // 🌟 修改了送出邏輯，讓它可以吃我們自訂的提示詞
    async function sendData(p, customSuccessMessage = "✅ 處理成功！") { 
        try { 
            const res = await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(p) }); 
            const text = await res.text();
            if (text === "Success") {
                alert(customSuccessMessage); 
            } else {
                alert("❌ 處理發生異常：" + text);
            }
            location.reload(); 
        } catch (e) { 
            alert("網路錯誤"); 
            location.reload(); 
        } 
    }

    function switchTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-content').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active'); document.getElementById(id).classList.add('active');
    }

    window.onload = () => {
        fetchEmployees(); handleTypeChange();
        if(navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                userLat = pos.coords.latitude; userLon = pos.coords.longitude;
                isWithinRange = getDistance(userLat, userLon, TARGET_LAT, TARGET_LON) <= ALLOWED_DIST;
                const typeInput = document.querySelector('input[name="attType"]:checked');
                if(typeInput && typeInput.value === "上班") updateGPSUI();
            }, null, { enableHighAccuracy: true });
        }
    };
</script>
</body>
</html>
