<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾禾園 - 員工系統 V8.2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 450px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #1a73e8; }
        .tab { flex: 1; text-align: center; padding: 15px 0; color: white; font-weight: bold; cursor: pointer; opacity: 0.7; }
        .tab.active { opacity: 1; border-bottom: 4px solid #fff; background: #155db1; }
        .form-content { padding: 25px 20px; display: none; }
        .form-content.active { display: block; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 14px; font-weight: bold; color: #444; margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .radio-group { display: flex; gap: 10px; }
        .radio-group label { flex: 1; text-align: center; background: #eee; padding: 12px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .radio-group input { display: none; }
        .radio-group input:checked + label { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; font-weight: bold; }
        .btn-submit { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('clockIn')">📍 每日打卡</div>
        <div class="tab" onclick="switchTab('leave')">📝 申請請假</div>
    </div>

    <div id="clockIn" class="form-content active">
        <div class="input-group"><label>👤 員工姓名</label><input type="text" id="attName" placeholder="請輸入姓名"></div>
        <div class="input-group"><label>🏢 所屬部門</label><select id="attDept"><option>業務部</option><option>會計部</option><option>生產部</option><option>運輸部</option><option>倉儲部</option><option>人事部</option></select></div>
        <div class="input-group"><label>⏱️ 上下班</label><div class="radio-group"><input type="radio" name="attType" id="typeIn" value="上班" checked><label for="typeIn">上班</label><input type="radio" name="attType" id="typeOut" value="下班"><label for="typeOut">下班</label></div></div>
        <div class="input-group"><label>⚡ 狀態</label><div class="radio-group"><input type="radio" name="attStatus" id="sN" value="正常" checked><label for="sN">正常</label><input type="radio" name="attStatus" id="sOT" value="加班"><label for="sOT">加班</label></div></div>
        <button class="btn-submit" onclick="submitAttendance()">送出打卡</button>
    </div>

    <div id="leave" class="form-content">
        <div class="input-group"><label>👤 員工姓名</label><input type="text" id="lvName" placeholder="請輸入姓名"></div>
        <div class="input-group">
            <label>📌 假別選擇</label>
            <select id="lvType">
                <option value="事假">事假</option>
                <option value="病假">病假</option>
                <option value="特休">特休</option>
                <option value="補休">補休</option>
                <option value="婚假">婚假 (全薪)</option>
                <option value="喪假">喪假 (全薪)</option>
                <option value="生理假">生理假 (半薪)</option>
                <option value="家庭照顧假">家庭照顧假 (無薪)</option>
                <option value="公假">公假 (全薪)</option>
            </select>
        </div>
        <div class="input-group"><label>📅 開始時間</label><input type="datetime-local" id="lvStart"></div>
        <div class="input-group"><label>📅 結束時間</label><input type="datetime-local" id="lvEnd"></div>
        <div class="input-group"><label>📝 事由</label><input type="text" id="lvReason" placeholder="請簡述原因"></div>
        <button class="btn-submit" onclick="submitLeave()">送出假單</button>
    </div>
</div>

<script>
    const CONFIG_URL = "https://script.google.com/macros/s/AKfycbx0clQCOIOULOi58C0ffABTWNEwDa3KFVUF0TK9FCcj-O1aFLtxWkIF0IOv7bn_Wml4RA/exec";
    function switchTab(t) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(t).classList.add('active');
    }
    async function submitAttendance() {
        const payload = { action: "write", sheetName: "attendance", name: document.getElementById('attName').value, dept: document.getElementById('attDept').value, type: document.querySelector('input[name="attType"]:checked').value, status: document.querySelector('input[name="attStatus"]:checked').value };
        await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert("打卡成功！");
    }
    async function submitLeave() {
        const payload = { action: "write", sheetName: "leave", name: document.getElementById('lvName').value, dept: document.getElementById('lvDept').value, leaveType: document.getElementById('lvType').value, start: document.getElementById('lvStart').value, end: document.getElementById('lvEnd').value, reason: document.getElementById('lvReason').value };
        await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert("假單已送出，請等候審核。");
    }
</script>
</body>
</html>
