<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾禾園 - 員工打卡與請假系統 (設備綁定版)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 450px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        
        .tabs { display: flex; background: #1a73e8; }
        .tab { flex: 1; text-align: center; padding: 15px 0; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; opacity: 0.7; }
        .tab.active { opacity: 1; border-bottom: 4px solid #fff; background: #155db1; }
        
        .form-content { padding: 25px 20px; display: none; }
        .form-content.active { display: block; }
        
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 14px; font-weight: bold; color: #444; margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; background-color: white; }
        
        .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .radio-group label { flex: 1; text-align: center; background: #eee; padding: 12px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; font-weight: normal; font-size: 14px; min-width: 120px; }
        .radio-group input { display: none; }
        .radio-group input:checked + label { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; font-weight: bold; }

        .btn-submit { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-submit:disabled { background: #aaa; cursor: not-allowed; }

        /* 🌟 解鎖按鈕的樣式 */
        .unlock-link { font-size: 12px; color: #d63384; font-weight: bold; cursor: pointer; text-align: right; display: block; margin-top: 5px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('clockIn')">📍 每日打卡</div>
        <div class="tab" onclick="switchTab('leave')">📝 申請請假</div>
    </div>

    <div id="clockIn" class="form-content active">
        <div class="input-group">
            <label>👤 員工姓名</label>
            <select id="attName" required>
                <option value="">⏳ 正在載入員工名單...</option>
            </select>
            <div id="unlockBox" style="display:none;">
                <span class="unlock-link" onclick="unlockDevice()">🔑 HR 解除設備綁定</span>
            </div>
        </div>
        
        <div class="input-group">
            <label>🏢 所屬部門</label>
            <select id="attDept">
                <option value="業務部">業務部</option><option value="會計部">會計部</option>
                <option value="生產部">生產部</option><option value="運輸部">運輸部</option>
                <option value="倉儲部">倉儲部</option><option value="人事部">人事部</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>⏱️ 上下班</label>
            <div class="radio-group">
                <input type="radio" name="attType" id="typeIn" value="上班" checked onchange="updateDynamicStatus()">
                <label for="typeIn">上班 (07:30)</label>
                <input type="radio" name="attType" id="typeOut" value="下班" onchange="updateDynamicStatus()">
                <label for="typeOut">下班 (16:30)</label>
            </div>
        </div>
        
        <div class="input-group">
            <label>⚡ 狀態選項</label>
            <div class="radio-group" id="dynamicStatus"></div>
        </div>
        
        <button id="btnAtt" class="btn-submit" onclick="submitAttendance()">送出打卡</button>
    </div>

    <div id="leave" class="form-content">
        <div class="input-group"><label>👤 員工姓名</label><select id="lvName" required><option value="">⏳ 正在載入員工名單...</option></select></div>
        <div class="input-group"><label>🏢 所屬部門</label><select id="lvDept"><option value="業務部">業務部</option><option value="會計部">會計部</option><option value="生產部">生產部</option><option value="運輸部">運輸部</option><option value="倉儲部">倉儲部</option><option value="人事部">人事部</option></select></div>
        <div class="input-group"><label>📌 假別選擇</label><select id="lvType"><option value="事假">事假 (無薪)</option><option value="病假">病假 (半薪)</option><option value="特休">特休 (全薪)</option><option value="補休">補休 (全薪)</option><option value="產假">產假 (全薪)</option><option value="公傷病假">公傷病假 (全薪)</option><option value="婚假">婚假 (全薪)</option><option value="喪假">喪假 (全薪)</option><option value="生理假">生理假 (半薪)</option><option value="家庭照顧假">家庭照顧假 (無薪)</option><option value="公假">公假 (全薪)</option></select></div>
        <div class="input-group"><label>📅 開始時間</label><input type="datetime-local" id="lvStart" required></div>
        <div class="input-group"><label>📅 結束時間</label><input type="datetime-local" id="lvEnd" required></div>
        <div class="input-group"><label>📝 請假事由</label><input type="text" id="lvReason" placeholder="請簡述事由" required></div>
        <button id="btnLv" class="btn-submit" onclick="submitLeave()">送出假單</button>
    </div>
</div>

<script>
    const CONFIG_URL = "https://script.google.com/macros/s/AKfycbx0clQCOIOULOi58C0ffABTWNEwDa3KFVUF0TK9FCcj-O1aFLtxWkIF0IOv7bn_Wml4RA/exec";

    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
        return null;
    }

    function setCookie(name, value) {
        const d = new Date();
        d.setTime(d.getTime() + (3650 * 24 * 60 * 60 * 1000)); 
        document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/";
    }

    // 🌟 HR 專屬解鎖函數
    function unlockDevice() {
        const pwd = prompt("🔒 請輸入人事部專用的「設備解鎖密碼」：");
        if (pwd === "123") { // 您可以隨時在這裡修改您的解鎖密碼
            // 透過將過期時間設定為過去，來強制刪除 Cookie
            document.cookie = "bound_employee=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            alert("🔓 設備已成功解除綁定！這台手機現在可以重新選擇員工了。");
            window.location.reload(); 
        } else if (pwd !== null) {
            alert("❌ 密碼錯誤，無法解鎖！");
        }
    }

    async function fetchEmployees() {
        try {
            const res = await fetch(CONFIG_URL);
            const db = await res.json();
            const empList = db.employees.filter(r => r[0] && r[0] !== "姓名");
            
            let optionsHTML = '<option value="" disabled selected>👉 請選擇您的姓名</option>';
            empList.forEach(emp => { optionsHTML += `<option value="${emp[0]}">${emp[0]} (${emp[1]})</option>`; });

            document.getElementById('attName').innerHTML = optionsHTML;
            document.getElementById('lvName').innerHTML = optionsHTML;

            const boundName = getCookie('bound_employee');
            if (boundName) {
                document.getElementById('attName').value = boundName;
                document.getElementById('attName').disabled = true; 
                
                // 🌟 如果設備被鎖定，顯示解鎖按鈕
                document.getElementById('unlockBox').style.display = "block";
                
                const hiddenInput = document.createElement("input");
                hiddenInput.type = "hidden"; hiddenInput.id = "hiddenAttName"; hiddenInput.value = boundName;
                document.getElementById('clockIn').appendChild(hiddenInput);
            }
        } catch (e) {
            document.getElementById('attName').innerHTML = '<option value="">⚠️ 網路不穩，請重新整理</option>';
        }
    }

    function updateDynamicStatus() {
        const type = document.querySelector('input[name="attType"]:checked').value;
        const container = document.getElementById('dynamicStatus');
        const now = new Date(); const totalMinutes = now.getHours() * 60 + now.getMinutes();
        let html = '';

        if (type === '上班') {
            if (totalMinutes <= 440) html = `<input type="radio" name="attStatus" id="s2" value="個人因素提早上班" checked><label for="s2">個人因素提早上班</label>`;
            else html = `<input type="radio" name="attStatus" id="s1" value="正常" checked><label for="s1">正常</label>`;
        } else if (type === '下班') {
            if (totalMinutes >= 1010) html = `<input type="radio" name="attStatus" id="s3" value="個人因素延後下班" checked><label for="s3">個人因素延後下班</label><input type="radio" name="attStatus" id="s4" value="經主管核准加班"><label for="s4">經主管核准加班</label>`;
            else html = `<input type="radio" name="attStatus" id="s1" value="正常" checked><label for="s1">正常</label>`;
        }
        container.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", () => {
        updateDynamicStatus(); fetchEmployees(); setInterval(updateDynamicStatus, 60000); 
    });

    async function submitAttendance() {
        const boundInput = document.getElementById('hiddenAttName');
        const name = boundInput ? boundInput.value : document.getElementById('attName').value;
        const dept = document.getElementById('attDept').value;
        const type = document.querySelector('input[name="attType"]:checked').value;
        const status = document.querySelector('input[name="attStatus"]:checked').value;

        if (!name) return alert("⚠️ 請選擇您的姓名！");

        const boundName = getCookie('bound_employee');
        if (boundName && boundName !== name) return alert(`🚫 警告：這支手機已綁定給「${boundName}」！`);

        const btn = document.getElementById('btnAtt');
        btn.innerText = "⏳ 傳送中..."; btn.disabled = true;

        const payload = { action: "write", sheetName: "attendance", name: name, dept: dept, type: type, status: status };

        try {
            await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert(`✅ 打卡成功！\n${name} - ${type} (${status})`);
            
            if (!boundName) {
                setCookie('bound_employee', name);
                alert(`🔒 設備綁定成功！\n以後這支手機將專屬於您（${name}）打卡使用。`);
                window.location.reload(); 
            }
        } catch (e) { alert("❌ 連線失敗，請檢查網路。"); } 
        finally { btn.innerText = "送出打卡"; btn.disabled = false; updateDynamicStatus(); }
    }

    async function submitLeave() {
        const name = document.getElementById('lvName').value; 
        const dept = document.getElementById('lvDept').value;
        const type = document.getElementById('lvType').value;
        const start = document.getElementById('lvStart').value;
        const end = document.getElementById('lvEnd').value;
        const reason = document.getElementById('lvReason').value.trim();

        if (!name || !start || !end || !reason) return alert("⚠️ 請填寫完整！");
        if (new Date(start) >= new Date(end)) return alert("⚠️ 結束時間必須晚於開始時間！");

        const btn = document.getElementById('btnLv');
        btn.innerText = "⏳ 傳送中..."; btn.disabled = true;

        const payload = { action: "write", sheetName: "leave", name: name, dept: dept, leaveType: type, start: start, end: end, reason: reason };

        try {
            await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert(`✅ 假單送出成功！`); document.getElementById('lvReason').value = ''; 
        } catch (e) { alert("❌ 連線失敗。"); } 
        finally { btn.innerText = "送出假單"; btn.disabled = false; }
    }
</script>
</body>
</html>
