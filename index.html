<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾禾園 考勤與請假系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #f8f9fa; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab.active { background: #4CAF50; color: white; }
        .section { display: none; }
        .section.active { display: block; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; margin-top: 25px; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-in { background-color: #4CAF50; }
        .btn-out { background-color: #f44336; margin-top: 10px; }
        .btn-leave { background-color: #2196F3; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        .note { font-size: 13px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌟 禾禾園 考勤系統</h2>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('attendance')">📍 上下班打卡</div>
        <div class="tab" onclick="switchTab('leave')">📝 請假申請</div>
    </div>

    <label>姓名 (必填)</label>
    <input type="text" id="empName" placeholder="請輸入真實姓名">
    
    <label>所屬部門 (選填)</label>
    <select id="empDept">
        <option value="">請選擇部門</option>
        <option value="行政部">行政部</option>
        <option value="業務部">業務部</option>
        <option value="現場人員">現場人員</option>
    </select>

    <div id="attendance-section" class="section active">
        <label>今日狀態</label>
        <select id="attStatus">
            <option value="正常">正常</option>
            <option value="遲到">遲到</option>
            <option value="經主管核准加班">經主管核准加班</option>
        </select>
        
        <label>備註事由 (加班必填)</label>
        <input type="text" id="attReason" placeholder="例如：塞車、主管指派加班...">
        
        <button class="btn-in" id="btnIn" onclick="submitAttendance('上班')">📍 上班打卡</button>
        <button class="btn-out" id="btnOut" onclick="submitAttendance('下班')">📍 下班打卡</button>
    </div>

    <div id="leave-section" class="section">
        <label>假別</label>
        <select id="leaveType">
            <option value="事假">事假</option>
            <option value="病假">病假</option>
            <option value="特休">特休</option>
            <option value="喪假">喪假</option>
            <option value="公假">公假</option>
        </select>

        <label>開始時間</label>
        <input type="datetime-local" id="leaveStart">

        <label>結束時間</label>
        <input type="datetime-local" id="leaveEnd">

        <label>請假事由</label>
        <textarea id="leaveReason" rows="3" placeholder="請簡述請假原因..."></textarea>

        <label>📸 證明照片 (選填，如病歷收據)</label>
        <input type="file" id="leaveFile" accept="image/*">
        <div class="note">上傳後系統會自動產生證明連結給主管。</div>

        <button class="btn-leave" id="btnLeave" onclick="submitLeave()">🚀 送出假單</button>
    </div>
</div>

<script>
    // ==========================================
    // 🚨 老闆注意：請把下面這串引號裡的網址，換成您最新的 Apps Script 部署網址！
    // ==========================================
    const CONFIG_URL = "YOUR_WEB_APP_URL_HERE"; 
    
    // 切換分頁邏輯
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        if(tabId === 'attendance') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('attendance-section').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('leave-section').classList.add('active');
        }
    }

    // 取得定位並送出打卡
    function submitAttendance(type) {
        const name = document.getElementById('empName').value.trim();
        const dept = document.getElementById('empDept').value;
        const status = document.getElementById('attStatus').value;
        const reason = document.getElementById('attReason').value;

        if (!name) return alert("⚠️ 請務必輸入姓名！");
        if (CONFIG_URL === "YOUR_WEB_APP_URL_HERE") return alert("⚠️ 老闆，您忘記把網址貼上去了喔！");

        // 按鈕變成處理中
        const btnId = type === '上班' ? 'btnIn' : 'btnOut';
        const btn = document.getElementById(btnId);
        const originalText = btn.innerText;
        btn.innerText = "⏳ 定位與傳送中...";
        btn.disabled = true;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => { sendAttData(type, name, dept, status, reason, position.coords.latitude, position.coords.longitude, btn, originalText); },
                (error) => { 
                    alert("⚠️ 無法取得定位，將以無定位方式打卡。\n請確認手機已開啟位置權限。");
                    sendAttData(type, name, dept, status, reason, "", "", btn, originalText); 
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            sendAttData(type, name, dept, status, reason, "", "", btn, originalText);
        }
    }

    function sendAttData(type, name, dept, status, reason, lat, lon, btn, originalText) {
        const payload = {
            action: "write",
            sheetName: "attendance",
            name: name, dept: dept, type: type, status: status, reason: reason, lat: lat, lon: lon
        };

        fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.text())
        .then(result => {
            // 🌟 V16.1 核心防呆：攔截重複打卡
            if (result === "Duplicate") {
                alert(`⚠️ 系統溫馨提示：\n${name}，您今天已經打過【${type}】卡囉！\n(系統已自動攔截，不會重複紀錄)`);
            } else if (result === "Success") {
                alert(`✅ ${type}打卡成功！辛苦了！`);
            } else {
                alert("❌ 發生錯誤：" + result);
            }
        })
        .catch(err => alert("❌ 網路連線異常，請確認網路後再試！"))
        .finally(() => {
            btn.innerText = originalText;
            btn.disabled = false;
        });
    }

    // 處理請假與照片上傳
    function submitLeave() {
        const name = document.getElementById('empName').value.trim();
        const dept = document.getElementById('empDept').value;
        const leaveType = document.getElementById('leaveType').value;
        const start = document.getElementById('leaveStart').value;
        const end = document.getElementById('leaveEnd').value;
        const reason = document.getElementById('leaveReason').value;
        const fileInput = document.getElementById('leaveFile');

        if (!name || !start || !end) return alert("⚠️ 姓名、開始與結束時間為必填！");

        const btn = document.getElementById('btnLeave');
        btn.innerText = "⏳ 假單傳送中...";
        btn.disabled = true;

        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                sendLeaveData(name, dept, leaveType, start, end, reason, e.target.result, file.name, btn);
            };
            reader.readAsDataURL(file);
        } else {
            sendLeaveData(name, dept, leaveType, start, end, reason, "", "", btn);
        }
    }

    function sendLeaveData(name, dept, leaveType, start, end, reason, imageFile, fileName, btn) {
        const payload = {
            action: "write",
            sheetName: "leave",
            name: name, dept: dept, leaveType: leaveType, start: start, end: end, reason: reason,
            imageFile: imageFile, fileName: fileName
        };

        fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.text())
        .then(result => {
            if (result === "Success") {
                alert("✅ 假單已成功送出！請等待主管審核。");
                document.getElementById('leaveReason').value = "";
                document.getElementById('leaveFile').value = "";
            } else {
                alert("❌ 發生錯誤：" + result);
            }
        })
        .catch(err => alert("❌ 網路連線異常，請確認網路後再試！"))
        .finally(() => {
            btn.innerText = "🚀 送出假單";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
