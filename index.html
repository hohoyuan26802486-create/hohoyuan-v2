<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾禾園 - 員工出勤系統</title>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #d93025; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #eef2f7; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 480px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 18px 10px; color: #5f6368; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 16px;}
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #f8faff; }
        .form-content { padding: 25px; display: none; }
        .form-content.active { display: block; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; color: #3c4043; margin-bottom: 8px; }
        .input-group select, .input-group input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        
        .type-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-toggle label { flex: 1; text-align: center; padding: 12px; border: 1px solid #dadce0; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; background: #f8f9fa; }
        .type-toggle input { display: none; }
        .type-toggle input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        /* GPS 狀態欄：上班顯示，下班隱藏 */
        .gps-box { padding: 12px; border-radius: 10px; text-align: center; font-size: 14px; font-weight: 600; margin-bottom: 20px; transition: 0.3s; display: none; }
        .gps-ok { background: #e6fffa; color: #234e52; border: 1px solid #38b2ac; display: block; }
        .gps-fail { background: #fff5f5; color: #742a2a; border: 1px solid #feb2b2; display: block; }

        .btn-submit { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
        .btn-submit:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        .hint { font-size: 12px; color: #d93025; font-weight: bold; margin-top: 5px;}
    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('clockIn')">📍 打卡</div>
        <div class="tab" onclick="switchTab('leave')">📝 請假</div>
        <div class="tab" onclick="switchTab('proofTab')">📎 補件</div>
    </div>

    <div id="clockIn" class="form-content active">
        <div class="input-group"><label>👤 員工姓名</label><select id="attName"></select></div>
        <div class="input-group"><label>🏢 所屬部門</label>
            <select id="attDept">
                <option>業務部</option><option>會計部</option><option>生產部</option>
                <option>運輸部</option><option>倉儲部</option><option>人事部</option>
            </select>
        </div>
        <label style="font-size: 14px; font-weight: 600; color: #3c4043;">⏱️ 上下班切換</label>
        <div class="type-toggle">
            <input type="radio" name="attType" id="typeIn" value="上班" checked onchange="handleTypeChange()"><label for="typeIn">上班</label>
            <input type="radio" name="attType" id="typeOut" value="下班" onchange="handleTypeChange()"><label for="typeOut">下班</label>
        </div>
        <div id="gpsStatusBox" class="gps-box"></div>
        <button id="btnAtt" class="btn-submit" onclick="submitAttendance()">送出打卡</button>
    </div>

    <div id="leave" class="form-content">
        <div class="input-group"><label>👤 員工姓名</label><select id="lvName"></select></div>
        <div class="input-group"><label>🏢 所屬部門</label><select id="lvDept"><option>業務部</option><option>會計部</option><option>生產部</option><option>運輸部</option><option>倉儲部</option><option>人事部</option></select></div>
        <div class="input-group"><label>📌 假別選擇</label>
            <select id="lvType">
                <option value="事假">事假</option><option value="病假">病假</option>
                <option value="生理假">生理假</option><option value="特休">特休</option>
                <option value="公假">公假</option><option value="其他">其他</option>
            </select>
        </div>
        <div class="input-group"><label>📅 開始時間</label><input type="datetime-local" id="lvStart"></div>
        <div class="input-group"><label>📅 結束時間</label><input type="datetime-local" id="lvEnd"></div>
        <div class="input-group"><label>📝 請假事由</label><input type="text" id="lvReason" placeholder="請填寫簡要原因"></div>
        <div class="input-group"><label>📸 證明文件 (選填)</label><input type="file" id="lvFile" accept="image/*"></div>
        <button id="btnLv" class="btn-submit" onclick="submitLeave()">送出假單</button>
    </div>

    <div id="proofTab" class="form-content">
        <div class="input-group"><label>👤 員工姓名</label><select id="prfName" onchange="loadPendingProofs()"></select></div>
        <div class="input-group"><label>📝 選擇缺件假單</label><select id="prfSelect"><option value="">請先選擇姓名...</option></select></div>
        <div class="input-group"><label>📸 上傳證明照片</label><input type="file" id="prfFile" accept="image/*"></div>
        <button id="btnPrf" class="btn-submit" onclick="submitProof()">送出補件</button>
    </div>
</div>

<script>
    const CONFIG_URL = "https://script.google.com/macros/s/AKfycbx0clQCOIOULOi58C0ffABTWNEwDa3KFVUF0TK9FCcj-O1aFLtxWkIF0IOv7bn_Wml4RA/exec";
    
    // 禾禾園精確座標
    const TARGET_LAT = 24.956646; 
    const TARGET_LON = 121.393925; 
    const ALLOWED_DIST = 1.0; 

    let userLat = null, userLon = null, isWithinRange = false, globalDB = null;

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180; 
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function updateLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude; 
            userLon = pos.coords.longitude;
            isWithinRange = getDistance(userLat, userLon, TARGET_LAT, TARGET_LON) <= ALLOWED_DIST;
            handleTypeChange();
        }, err => { 
            if(document.querySelector('input[name="attType"]:checked').value === "上班") { 
                const box = document.getElementById('gpsStatusBox'); 
                box.innerText = "❌ 請開啟 GPS 定位權限"; 
                box.className = "gps-box gps-fail"; 
            } 
        }, { enableHighAccuracy: true });
    }

    function handleTypeChange() {
        const type = document.querySelector('input[name="attType"]:checked').value;
        const statusBox = document.getElementById('gpsStatusBox');
        const btn = document.getElementById('btnAtt');
        if (type === "下班") { 
            statusBox.style.display = "none"; 
            btn.disabled = false; 
        } else {
            statusBox.style.display = "block";
            if (userLat === null) { 
                statusBox.innerText = "🛰️ 正在抓取定位..."; 
                statusBox.className = "gps-box gps-fail"; 
                btn.disabled = true; 
            } else if (isWithinRange) { 
                statusBox.innerText = "✅ 已進入打卡範圍 (1km內)"; 
                statusBox.className = "gps-box gps-ok"; 
                btn.disabled = false; 
            } else { 
                statusBox.innerText = "❌ 距離太遠，無法上班"; 
                statusBox.className = "gps-box gps-fail"; 
                btn.disabled = true; 
            }
        }
    }

    async function fetchEmployees() {
        try {
            const res = await fetch(CONFIG_URL); 
            globalDB = await res.json();
            const opts = globalDB.employees.filter(r => r[0] !== "姓名" && r[0] !== "").map(r => `<option value="${r[0]}">${r[0]}</option>`).join('');
            document.getElementById('attName').innerHTML = opts;
            document.getElementById('lvName').innerHTML = opts;
            document.getElementById('prfName').innerHTML = opts;
        } catch (e) { alert("讀取員工名單失敗，請確認網路或試算表設定。"); }
    }

    function loadPendingProofs() {
        const name = document.getElementById('prfName').value;
        const pending = globalDB.leave.filter(r => r[2] === name && (!r[9] || !String(r[9]).includes('http')));
        const sel = document.getElementById('prfSelect');
        if (pending.length === 0) { 
            sel.innerHTML = '<option value="">🎉 您目前無需補件</option>'; 
            sel.disabled = true; 
        } else { 
            sel.innerHTML = pending.map(r => `<option value="${r[0]}">${r[1].split('T')[0]} - ${r[4]}</option>`).join(''); 
            sel.disabled = false; 
        }
    }

    async function submitAttendance() {
        const name = document.getElementById('attName').value;
        const type = document.querySelector('input[name="attType"]:checked').value;
        const dept = document.getElementById('attDept').value;
        const btn = document.getElementById('btnAtt'); 
        btn.innerText = "⏳ 傳送中..."; btn.disabled = true;
        try {
            await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify({ action: "write", sheetName: "attendance", name, dept, type, status: "正常" }) });
            alert("✅ 打卡成功！"); 
            location.reload();
        } catch (e) { alert("傳送失敗，請重試"); btn.innerText = "送出打卡"; btn.disabled = false; }
    }

    async function submitLeave() {
        const file = document.getElementById('lvFile').files[0];
        const btn = document.getElementById('btnLv'); 
        btn.innerText = "⏳ 正在送出..."; btn.disabled = true;
        const name = document.getElementById('lvName').value;
        const payload = { action: "write", sheetName: "leave", name, dept: document.getElementById('lvDept').value, leaveType: document.getElementById('lvType').value, start: document.getElementById('lvStart').value, end: document.getElementById('lvEnd').value, reason: document.getElementById('lvReason').value };
        
        if (file) {
            const reader = new FileReader(); 
            reader.readAsDataURL(file);
            reader.onload = async () => { 
                payload.imageFile = reader.result; 
                payload.fileName = file.name; 
                await sendData(payload); 
            };
        } else { await sendData(payload); }
    }

    async function submitProof() {
        const file = document.getElementById('prfFile').files[0];
        if (!file) return alert("請先選取證明照片！");
        const btn = document.getElementById('btnPrf'); 
        btn.innerText = "⏳ 正在上傳..."; btn.disabled = true;
        const reader = new FileReader(); 
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const payload = { action: "uploadLeaveProof", id: document.getElementById('prfSelect').value, name: document.getElementById('prfName').value, imageFile: reader.result, fileName: file.name };
            await sendData(payload);
        };
    }

    async function sendData(p) { 
        try { 
            await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify(p) }); 
            alert("✅ 資料已成功送出！"); 
            location.reload(); 
        } catch (e) { 
            alert("伺服器回應失敗，請重試"); 
            location.reload(); 
        } 
    }

    function switchTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-content').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(id).classList.add('active');
    }

    window.onload = () => { 
        fetchEmployees(); 
        updateLocation(); 
        setInterval(updateLocation, 10000); 
    };
</script>
</body>
</html>
