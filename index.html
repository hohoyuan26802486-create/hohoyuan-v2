<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾禾園 - 考勤系統 V13.0</title>
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --success: #28a745; }
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 15px; color: #5f6368; font-weight: bold; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .form-content { padding: 20px; display: none; }
        .form-content.active { display: block; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .input-group select, .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-submit:disabled { background: #ccc; }
        .gps-status { padding: 10px; border-radius: 8px; text-align: center; font-size: 14px; font-weight: bold; margin-bottom: 15px; display: none; }
        .status-options { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .status-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 13px; cursor: pointer; background: #f8f9fa; }
        .status-btn.selected { background: #e8f0fe; border-color: var(--primary); color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('clockIn')">📍 打卡</div>
        <div class="tab" onclick="switchTab('leave')">📝 請假</div>
    </div>

    <div id="clockIn" class="form-content active">
        <div class="input-group"><label>👤 員工姓名</label><select id="attName"></select></div>
        <div id="unlockLink" style="display:none; text-align:right; margin-bottom:10px;"><a href="#" onclick="unlockDevice()" style="font-size:12px; color:var(--danger);">🔑 解除手機鎖定</a></div>
        
        <div class="status-options">
            <div id="typeIn" class="status-btn selected" onclick="setType('上班')">上班打卡</div>
            <div id="typeOut" class="status-btn" onclick="setType('下班')">下班打卡</div>
        </div>

        <div id="statusArea">
            <label style="font-size:14px; font-weight:bold;">⚡ 狀態選項</label>
            <div id="statusList" class="status-options" style="margin-top:5px;"></div>
        </div>

        <div id="gpsBox" class="gps-status"></div>
        <button id="btnAtt" class="btn-submit" onclick="submitAttendance()">送出打卡</button>
    </div>
    
    </div>

<script>
    const CONFIG_URL = "您的_WEB_APP_網址";
    const TARGET_LAT = 24.956646; const TARGET_LON = 121.393925; const ALLOWED_DIST = 1.0;
    let currentType = "上班"; let selectedStatus = ""; let userLat = null; let userLon = null;

    function setCookie(n, v) { const d = new Date(); d.setTime(d.getTime() + (3650*24*60*60*1000)); document.cookie = n + "=" + v + ";expires=" + d.toUTCString() + ";path=/"; }
    function getCookie(n) { const v = `; ${document.cookie}`; const p = v.split(`; ${n}=`); if (p.length === 2) return p.pop().split(';').shift(); return null; }

    function switchTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-content').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active'); document.getElementById(id).classList.add('active');
    }

    function setType(t) {
        currentType = t;
        document.getElementById('typeIn').className = t === '上班' ? 'status-btn selected' : 'status-btn';
        document.getElementById('typeOut').className = t === '下班' ? 'status-btn selected' : 'status-btn';
        updateStatusOptions();
    }

    function updateStatusOptions() {
        const list = document.getElementById('statusList');
        const now = new Date();
        const time = now.getHours() * 60 + now.getMinutes();
        list.innerHTML = "";
        
        if (currentType === "上班") {
            if (time < 440) { // 07:20 前
                addStatusBtn("個人因素提早上班", true);
            } else if (time >= 440 && time <= 450) { // 07:20 ~ 07:30
                addStatusBtn("正常上班", true);
            } else { // 07:30 後
                addStatusBtn("遲到", true);
            }
            // 🌟 自動提醒功能：如果 07:40 還沒打卡，按鈕會變紅閃爍 (邏輯在 submit 判斷)
        } else {
            if (time >= 1010) { // 16:50 後
                addStatusBtn("因個人因素延後下班", true);
                addStatusBtn("經主管核准加班", false);
            } else {
                addStatusBtn("正常下班", true);
            }
        }
    }

    function addStatusBtn(txt, isDefault) {
        const div = document.createElement('div');
        div.className = isDefault ? "status-btn selected" : "status-btn";
        div.innerText = txt;
        if(isDefault) selectedStatus = txt;
        div.onclick = function() {
            document.querySelectorAll('#statusList .status-btn').forEach(b => b.classList.remove('selected'));
            div.classList.add('selected'); selectedStatus = txt;
        };
        document.getElementById('statusList').appendChild(div);
    }

    function unlockDevice() {
        if (prompt("🔐 請輸入 HR 解鎖密碼：") === "456") {
            document.cookie = "bound_user=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            alert("🔓 手機已解除鎖定，請重新選擇姓名！"); location.reload();
        } else { alert("❌ 密碼錯誤！"); }
    }

    async function submitAttendance() {
        const name = document.getElementById('attName').value;
        const bound = getCookie('bound_user');
        if (bound && bound !== name) return alert("⚠️ 此手機已鎖定員工：" + bound);
        
        if (currentType === "上班") {
            if (!userLat) return alert("等待定位中...");
            const dist = getDistance(userLat, userLon, TARGET_LAT, TARGET_LON);
            if (dist > ALLOWED_DIST) return alert("❌ 超出範圍，請回公司打卡！");
        }

        const btn = document.getElementById('btnAtt'); btn.innerText = "傳送中..."; btn.disabled = true;
        try {
            await fetch(CONFIG_URL, { method: 'POST', body: JSON.stringify({ action: "write", sheetName: "attendance", name: name, type: currentType, status: selectedStatus }) });
            if (!bound) setCookie('bound_user', name);
            alert("✅ " + currentType + "成功！"); location.reload();
        } catch (e) { alert("傳送失敗"); btn.disabled = false; btn.innerText = "送出打卡"; }
    }

    // GPS 與初始化邏輯 (同前版)
    // ...
</script>
</body>
</html>
